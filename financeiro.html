<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Financeiro — Escritório</title>
<style>
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15);
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --teal:#39d353;--teal2:#2ea043;--blue:#58a6ff;
  --purple:#bc8cff;--pink:#f778ba;--yellow:#e3b341;
  --orange:#f0883e;--red:#f85149;--green:#56d364;
  --sw:230px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99999}
.login-box{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;padding:40px 36px;width:100%;max-width:360px;text-align:center}
.login-ico{width:52px;height:52px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#0d1117;margin:0 auto 20px}
.login-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:28px}
.login-field input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);padding:11px 14px;font-size:15px;outline:none;transition:border-color .15s;text-align:center;letter-spacing:4px}
.login-field input:focus{border-color:var(--blue)}
.login-field input::placeholder{letter-spacing:0;color:var(--tx3)}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--teal2),var(--blue));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .12s;margin-top:12px}
.login-btn:hover{opacity:.88}
.login-err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:18px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
#app{display:flex;height:100vh}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--s1);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:12px;padding:20px 16px;border-bottom:1px solid var(--bd)}
.brand-ico{width:34px;height:34px;background:linear-gradient(135deg,var(--teal),var(--blue));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#0d1117;flex-shrink:0}
.brand-name{font-weight:700;font-size:14px;color:var(--tx)}
.brand-sub{font-size:11px;color:var(--tx3);margin-top:1px}
nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nv{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  border:1px solid transparent;background:none;color:var(--tx2);font-size:13px;
  width:100%;text-align:left;transition:all .12s}
.nv:hover{background:var(--s2);color:var(--tx)}
.nv.on{background:rgba(88,166,255,.1);color:var(--blue);border-color:rgba(88,166,255,.2)}
.nv-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--yellow);color:#0d1117;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.sidebar-foot{padding:12px 8px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
.btn-exp{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;
  background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx2);font-size:12.5px;transition:all .12s}
.btn-exp:hover{background:var(--s3);color:var(--tx)}
.sync-status{display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:11px;color:var(--tx3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0}
.sync-dot.ok{background:var(--teal)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--s1);gap:12px}
.page-ttl{font-size:18px;font-weight:700;color:var(--tx)}
.topbar-r{display:flex;align-items:center;gap:10px}
.yr-sel select{background:var(--s2);border:1px solid var(--bd2);color:var(--tx);border-radius:8px;padding:6px 10px;font-size:13px}
.content{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;transition:all .12s}
.btn-pri{background:linear-gradient(135deg,var(--teal2),var(--blue));color:#fff;font-weight:600}
.btn-pri:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-ghost:hover{background:var(--s3);color:var(--tx)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.k-teal::before{background:linear-gradient(90deg,var(--teal),var(--blue))}
.k-green::before{background:linear-gradient(90deg,var(--green),var(--teal))}
.k-blue::before{background:linear-gradient(90deg,var(--blue),var(--purple))}
.k-orange::before{background:linear-gradient(90deg,var(--orange),var(--pink))}
.k-yellow::before{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.k-red::before{background:linear-gradient(90deg,var(--red),var(--pink))}
.kpi-lbl{font-size:10.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:8px}
.kpi-val{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:3px}
.kpi-sub{font-size:11.5px;color:var(--tx2)}
.pie-legend{display:flex;flex-direction:column;gap:2px;padding:10px 6px 4px}
.pie-leg-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:5px 10px;border-radius:6px;transition:background .15s}
.pie-leg-item:hover{background:rgba(255,255,255,.07)}
.pie-leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pie-leg-name{color:var(--tx);flex:1;min-width:90px}
.pie-leg-pct{color:var(--tx2);font-size:12px;min-width:44px;text-align:right}
.pie-leg-val{color:var(--tx3);font-size:11.5px;min-width:84px;text-align:right}
.pie-tooltip{position:fixed;background:#1c2128;border:1px solid var(--bd2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);pointer-events:none;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5);line-height:1.6}
.charts-row{display:grid;grid-template-columns:1fr 340px;gap:14px;margin-bottom:14px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.card.wide{margin-bottom:0}
.card-ttl{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.yr-pill{background:var(--s2);border:1px solid var(--bd2);padding:2px 8px;border-radius:99px;font-size:11px;color:var(--tx2);font-weight:400}
canvas{display:block}
.pend-card{background:var(--s1);border:1px solid rgba(227,179,65,.18);border-radius:14px;padding:18px 20px}
.pend-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.pend-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;background:var(--s2)}
.pend-row:hover{background:var(--s3)}
.pt{font-size:12px;font-weight:700;width:16px;text-align:center}
.pt.r{color:var(--teal)}.pt.d{color:var(--red)}
.pdesc{flex:1;font-size:12.5px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcat{font-size:11px;color:var(--tx3);min-width:110px}
.pdata{font-size:11px;color:var(--tx2);min-width:80px}
.pval{font-size:12.5px;font-weight:600;min-width:95px;text-align:right}
.pval.r{color:var(--teal)}.pval.d{color:var(--red)}
.tbl-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.tbl-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--bd)}
.sec-ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.tbl-scroll{overflow-x:auto}
.lan-scroll{max-height:calc(100vh - 255px);overflow:auto}
table{width:100%;border-collapse:collapse}
.fin-tbl{min-width:1050px}
.fin-tbl th{background:var(--s2);padding:9px 11px;text-align:right;font-size:11px;font-weight:600;color:var(--tx2);border-bottom:1px solid var(--bd);white-space:nowrap}
.fin-tbl th:first-child{text-align:left;min-width:210px}
.fin-tbl .tc{background:var(--s3)}
.dr td{padding:7px 11px;text-align:right;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx2)}
.dr td:first-child{text-align:left}
.dr.bold td{font-weight:600;color:var(--tx)!important}
.dr.hl td{background:rgba(88,166,255,.04)}
.dr.tot td{background:rgba(57,211,83,.07);font-weight:700!important;color:var(--teal)!important}
.dr.tot-bal td{background:rgba(88,166,255,.07);font-weight:700!important;color:var(--blue)!important}
.dr.proj-row td{background:rgba(88,166,255,.04);font-style:italic;color:var(--tx2)}
.dr.proj-tot td{background:rgba(88,166,255,.12);font-weight:700!important;color:#58a6ff!important}
.sep td{background:var(--s2);padding:6px 16px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd)}
.sep.proj-sep td{background:rgba(88,166,255,.08);color:#58a6ff}
.neg{color:var(--red)!important}.pos{color:var(--tx)}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.fg{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--bd2);border-radius:8px;padding:5px 10px;color:var(--tx2);font-size:12.5px}
.fg select{background:var(--s1);border:none;color:var(--tx);font-size:12.5px;outline:none}
.sinp{background:var(--s1);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;color:var(--tx);font-size:12.5px;outline:none;width:185px}
.sinp::placeholder{color:var(--tx3)}
.cbadge{background:var(--s2);border:1px solid var(--bd);padding:3px 10px;border-radius:99px;font-size:11.5px;color:var(--tx2)}
.lan-tbl{min-width:880px}
.lan-tbl th{background:var(--s1);padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--tx2);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:5}
.lan-tbl.resizable{table-layout:fixed;width:max-content;min-width:100%}
.lan-tbl.resizable th{position:sticky}
.lan-tbl.resizable td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lan-tbl.resizable .dc{max-width:none}
.fin-tbl.resizable{table-layout:fixed;width:max-content;min-width:100%}
.fin-tbl.resizable th{position:sticky;top:0;overflow:hidden;text-overflow:ellipsis;min-width:unset!important}
.fin-tbl.resizable th:first-child{min-width:unset!important;text-align:left}
.fin-tbl.resizable td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lan-th{position:relative;overflow:hidden;text-overflow:ellipsis}
.col-resize{position:absolute;top:0;right:-3px;width:7px;height:100%;cursor:col-resize;user-select:none;z-index:3}
.col-resize::after{content:'';position:absolute;right:3px;top:24%;bottom:24%;width:1px;background:var(--bd2);opacity:0}
.lan-th:hover .col-resize::after,.col-resize:hover::after{opacity:1}
body.resizing-col{cursor:col-resize;user-select:none}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--tx)}
.th-sort .sort-ico{margin-left:4px;opacity:.4;font-size:10px}
.th-sort.asc .sort-ico::after{content:'▲'}
.th-sort.desc .sort-ico::after{content:'▼'}
.th-sort:not(.asc):not(.desc) .sort-ico::after{content:'⇅'}
.lr td{padding:9px 13px;border-bottom:1px solid var(--bd);font-size:12.5px;color:var(--tx2);vertical-align:middle}
.lr{cursor:pointer}.lr:hover td{background:rgba(255,255,255,.05)}
.lr:last-child td{border-bottom:none}
.tp{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.tp.r{background:rgba(57,211,83,.12);color:var(--teal)}
.tp.d{background:rgba(248,81,73,.12);color:var(--red)}
.tp.t{background:rgba(88,166,255,.15);color:#58a6ff}
.ct{font-size:12px;color:var(--tx)}.cs{font-size:10.5px;color:var(--tx3)}
.dc{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc{font-variant-numeric:tabular-nums;font-weight:600}
.vc.r{color:var(--teal)}.vc.d{color:var(--red)}
.empty-row{text-align:center;padding:40px!important;color:var(--tx3)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.bg{background:rgba(86,211,100,.12);color:var(--green)}
.by{background:rgba(227,179,65,.12);color:var(--yellow)}
.br{background:rgba(248,81,73,.12);color:var(--red)}
.bx{background:var(--s2);color:var(--tx3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;animation:su .2s ease}
.modal.modal-lancamento{max-height:98vh;max-width:660px;overflow:hidden}
.modal-lancamento .modal-hdr{padding:12px 22px 10px}
.modal-lancamento .fgrid{gap:9px 12px;padding:12px 22px 14px}
.modal-lancamento .fl{font-size:11px;margin-bottom:2px}
.modal-lancamento input[type=text],.modal-lancamento input[type=number],.modal-lancamento input[type=date],.modal-lancamento input[type=month],.modal-lancamento select,.modal-lancamento textarea{padding:6px 9px;font-size:12.5px}
.modal-lancamento .tb{padding:7px;font-size:12.5px}
.modal-lancamento textarea{height:38px;min-height:38px;resize:vertical}
.modal-lancamento .fa{padding-top:2px}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--bd)}
.modal-hdr h2{font-size:16px;font-weight:700}
.cls{background:none;border:none;color:var(--tx2);font-size:20px;padding:2px 6px;border-radius:6px;transition:all .1s}
.cls:hover{background:var(--s2);color:var(--tx)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px 22px}
.fl{font-size:11.5px;color:var(--tx2);font-weight:500;margin-bottom:4px}
input[type=text],input[type=number],input[type=date],input[type=month],select,textarea{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:7px 10px;font-size:13px;outline:none;transition:border-color .12s;width:100%;color-scheme:dark}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select{appearance:auto;background-color:var(--s2);color:var(--tx)}
select option,select optgroup{background-color:var(--s2);color:var(--tx)}
select option:checked{background-color:var(--blue);color:#fff}
select option:disabled{color:var(--tx3)}
input::placeholder{color:var(--tx3)}
.ro{color:var(--tx2)!important;cursor:default}
.tt{display:flex;gap:8px}
.tb{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:13px;transition:all .12s}
.tb.ar{background:rgba(57,211,83,.1);border-color:var(--teal);color:var(--teal)}
.tb.ad{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red)}
.fa{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--s3);border:1px solid var(--bd2);border-radius:10px;padding:11px 16px;font-size:13px;z-index:9999;animation:su .2s ease;display:flex;align-items:center;gap:8px;max-width:300px}
.toast.ok{border-left:3px solid var(--teal)}
.toast.err{border-left:3px solid var(--red)}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9000}
.spinner{width:36px;height:36px;border:3px solid var(--s3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
(function clearOldAppCache(){
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(function(registrations){
        registrations.forEach(function(registration){
          registration.unregister();
        });
      })
      .catch(function(error){
        console.warn('Nao foi possivel remover service workers antigos:', error);
      });
  }

  if ('caches' in window) {
    caches.keys()
      .then(function(keys){
        keys.forEach(function(key){
          caches.delete(key);
        });
      })
      .catch(function(error){
        console.warn('Nao foi possivel limpar o Cache Storage:', error);
      });
  }
})();
</script>
<div id="login-screen">
  <div class="login-box">
    <div class="login-ico">₢</div>
    <div class="login-title">Financeiro</div>
    <div class="login-sub">Escritório — Acesso restrito</div>
    <div class="login-field" style="margin-bottom:8px">
      <input id="login-email" type="email" placeholder="E-mail" autocomplete="username" style="letter-spacing:0" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()"/>
    </div>
    <div class="login-field">
      <input id="login-pass" type="password" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-ico">₢</div>
      <div><div class="brand-name">Financeiro</div><div class="brand-sub">Escritório <span id="app-ver" style="color:var(--tx3)"></span></div></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-txt">Conectando...</span></div>
      <button class="btn-exp" onclick="doLogout()" style="color:var(--red);border-color:rgba(248,81,73,.3)">🔒 Sair</button>
      <button class="btn-exp" onclick="exportExcel()">📥 Exportar Excel</button>
      <button class="btn-exp" onclick="document.getElementById('imp-fat-file').click()">📤 Importar Faturamento</button>
      <input type="file" id="imp-fat-file" accept=".csv,.xls,.xlsx" style="display:none" onchange="onImpFatChange(event)">
    </div>
  </aside>
  <main id="main">
    <header class="topbar">
      <div><h1 class="page-ttl" id="page-ttl">Dashboard</h1></div>
      <div class="topbar-r">
        <div class="yr-sel"><select id="yr-sel" onchange="setYear(this.value)"></select></div>
        <button class="btn btn-ghost" onclick="openTransfModal()" style="font-size:13px">↔ Transferência</button>
        <button class="btn btn-pri" onclick="openForm()">＋ Novo Lançamento</button>
      </div>
    </header>
    <div class="content" id="content"></div>

const sbFetch=async(method,path,body=null)=>{
  const token=localStorage.getItem('sb_token')||SUPABASE_KEY;
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${token}`,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,opts);
  if(!r.ok){const err=await r.json().catch(()=>({message:r.statusText}));throw new Error(err.message||r.statusText);}
  const txt=await r.text();return txt?JSON.parse(txt):null;
};

async function migrarProLabore(){
  const DE='Pró-Labore', PARA='Pro-labores/Retiradas', SLUG=slugify(PARA);
  try{
    // Atualiza lançamentos e recorrentes
    await sbFetch('PATCH',`${TABLE}?sub=eq.${encodeURIComponent(DE)}`,{sub:PARA});
    await sbFetch('PATCH',`recorrentes?sub=eq.${encodeURIComponent(DE)}`,{sub:PARA});
    // Atualiza a subcategoria na tabela do Supabase
    await sbFetch('PATCH',`subcategorias?nome=eq.${encodeURIComponent(DE)}`,{nome:PARA,slug:SLUG});
    // Atualiza em memória
    DATA.forEach(l=>{if(l.sub===DE)l.sub=PARA;});
    RECORRENTES_DESPESAS.forEach(r=>{if(r.sub===DE)r.sub=PARA;});
    for(const tipo of ['R','D']){
      for(const cat of CATS_DATA[tipo]||[]){
        const sub=(cat.subs||[]).find(s=>s.nome===DE);
        if(sub){sub.nome=PARA;sub.slug=SLUG;}
      }
    }
    rebuildCatsObj();
    render();
    alert(`✓ Migração concluída: "${DE}" → "${PARA}"`);
  }catch(e){alert('Erro na migração: '+e.message);}

let DATA=[];
const newId=()=>crypto.randomUUID();

// CATS é dinâmico — carregado do Supabase
// Estrutura: {R: [{id, nome, ordem, subs:[{id,nome,ordem,slug}]}], D: [...]}
let CATS_DATA = {R:[], D:[]};

// CATS compatível com o restante do código (objeto nome->array de subs)
const CATS = {R:{}, D:{}};

function rebuildCatsObj() {
  ['R','D'].forEach(tipo => {
    CATS[tipo] = {};
    (CATS_DATA[tipo]||[]).sort((a,b)=>a.ordem-b.ordem).forEach(cat => {
      CATS[tipo][cat.nome] = (cat.subs||[]).sort((a,b)=>a.ordem-b.ordem).map(s=>s.nome);
    });
  });
}

// Slugify: transforma nome de categoria em chave para DRE/Fluxo
function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');}

// Mapeamento fixo de fallback para categorias padrão
const SLUG_FALLBACK = {
  'pessoal':'pessoal',
  'impostos e taxas':'impostos_e_taxas',
  'infraestrutura':'infraestrutura',
  'tecnologia':'tecnologia',
  'marketing':'marketing',
  'administrativo':'administrativo',
  'financeiro':'financeiro',
};

// Retorna o slug de uma categoria para uso nos cálculos
function catSlug(nome){
  // 1. Tenta achar no CATS_DATA carregado do Supabase
  const d = (CATS_DATA.D||[]).find(c=>c.nome===nome);
  if(d && d.slug) return d.slug;
  // 2. Tenta fallback fixo
  const k = (nome||'').toLowerCase().trim();
  if(SLUG_FALLBACK[k]) return SLUG_FALLBACK[k];
  // 3. Gera slug dinamicamente
  return slugify(nome);
}

// Retorna todas as categorias de despesa com seus slugs (para DRE/Fluxo dinâmico)
function getDespCats(){
  return (CATS_DATA.D||[]).sort((a,b)=>a.ordem-b.ordem).map(c=>({
    ...c,
    slug: c.slug || SLUG_FALLBACK[(c.nome||'').toLowerCase().trim()] || slugify(c.nome)
  }));
}
function getRecCats(){return (CATS_DATA.R||[]).sort((a,b)=>a.ordem-b.ordem);}

// Categorias excluídas do DRE (aparecem apenas no Fluxo de Caixa)
const EXCL_DRE_SLUGS = new Set(['reembolso','transferencia']);
function isExclDRE(cat){ return EXCL_DRE_SLUGS.has(cat.slug||slugify(cat.nome)) || !!cat.excluir_dre; }

// Categoria especial de receita financeira
function isRecFinCat(nome){
  const r=(CATS_DATA.R||[]).find(c=>c.nome===nome);
  if(r) return (r.slug||slugify(r.nome)).includes('financeira');
  return (nome||'').toLowerCase().includes('financeira');
}

function calcDRE(year){
  const despCats=getDespCats().filter(c=>!isExclDRE(c));
  const recCats=getRecCats().filter(c=>!isExclDRE(c));
  const base={totRec:0,totDesp:0,ebitda:0,ll:0,
    // Totalizadores intermediários do modelo Skala
    recOpBruta:0, impostos:0, custosOp:0, recOpLiq:0,
    cusPessoal:0, lucOpBruto:0, despOp:0, resOp:0,
    investimentos:0, recFin:0, outrasRec:0, doacoes:0
  };
  // Chave por categoria
  recCats.forEach(c=>{ base['r_'+(c.slug||slugify(c.nome))]=0; });
  despCats.forEach(c=>{ base['d_'+(c.slug||slugify(c.nome))]=0; });
  // Chave por subcategoria
  recCats.forEach(c=>{ (c.subs||[]).forEach(s=>{ base['rs_'+(s.slug||slugify(s.nome))]=0; }); });
  despCats.forEach(c=>{ (c.subs||[]).forEach(s=>{ base['ds_'+(s.slug||slugify(s.nome))]=0; }); });

  const m=Array.from({length:12},()=>({...base}));

  DATA.forEach(l=>{
    if(!l.dataComp||getY(l.dataComp)!==year||l.status==='Cancelado')return;
    const i=getM(l.dataComp),v=parseMoney(l.valorLiq);
    if(l.tipo==='R'){
      const rc=recCats.find(c=>c.nome===l.cat);
      const rslug='r_'+(rc?(rc.slug||slugify(rc.nome)):slugify(l.cat));
      m[i][rslug]=(m[i][rslug]||0)+v;
      // Subcategoria
      if(rc){
        const sub=(rc.subs||[]).find(s=>s.nome===l.sub);
        if(sub){ const sk='rs_'+(sub.slug||slugify(sub.nome)); m[i][sk]=(m[i][sk]||0)+v; }
      }
    } else {
      const dc=despCats.find(c=>c.nome===l.cat);
      const dslug='d_'+(dc?(dc.slug||slugify(dc.nome)):catSlug(l.cat));
      m[i][dslug]=(m[i][dslug]||0)+v;
      // Subcategoria
      if(dc){
        const sub=(dc.subs||[]).find(s=>s.nome===l.sub);
        if(sub){ const sk='ds_'+(sub.slug||slugify(sub.nome)); m[i][sk]=(m[i][sk]||0)+v; }
      }
    }
  });

  const PESSOAL_SLUG      = 'pessoal';
  const IMPOSTOS_SLUG     = 'impostos_e_taxas';
  const EXCL_DESP_SLUGS   = [PESSOAL_SLUG, IMPOSTOS_SLUG];

  m.forEach(r=>{
    // Receitas operacionais (exceto Financeira e Outras)
    const recFinCat = recCats.find(c=>(c.slug||slugify(c.nome))==='receita_financeira');
    const outrasCat = recCats.find(c=>(c.slug||slugify(c.nome))==='outras_receitas');
    const recFinVal = recFinCat ? (r['r_'+(recFinCat.slug||slugify(recFinCat.nome))]||0) : 0;
    const outrasVal = outrasCat ? (r['r_'+(outrasCat.slug||slugify(outrasCat.nome))]||0) : 0;
    r.recOpBruta = recCats.reduce((s,c)=>s+(r['r_'+(c.slug||slugify(c.nome))]||0),0) - recFinVal - outrasVal;
    // Impostos
    const impostoCat = despCats.find(c=>(c.slug||slugify(c.nome))===IMPOSTOS_SLUG);
    r.impostos  = impostoCat ? (r['d_'+(impostoCat.slug||slugify(impostoCat.nome))]||0) : 0;
    r.custosOp  = 0;
    r.recOpLiq  = r.recOpBruta - r.impostos;
    // Custo pessoal
    const pessoalCat = despCats.find(c=>(c.slug||slugify(c.nome))===PESSOAL_SLUG);
    r.cusPessoal = pessoalCat ? (r['d_'+(pessoalCat.slug||slugify(pessoalCat.nome))]||0) : 0;
    r.lucOpBruto = r.recOpLiq - r.cusPessoal;
    // Despesas operacionais (todas as categorias exceto Pessoal e Impostos e Taxas)
    r.despOp = despCats.filter(c=>!EXCL_DESP_SLUGS.includes(c.slug||slugify(c.nome))).reduce((s,c)=>s+(r['d_'+(c.slug||slugify(c.nome))]||0),0);
    r.resOp  = r.lucOpBruto - r.despOp;
    r.investimentos = 0;
    r.recFin        = recFinVal;
    r.outrasRec     = outrasVal;
    r.doacoes       = 0;
    // Totais gerais
    r.totRec  = r.recOpBruta + recFinVal + outrasVal;
    r.totDesp = despCats.reduce((s,c)=>s+(r['d_'+(c.slug||slugify(c.nome))]||0),0);
    r.ll      = r.resOp + r.recFin + r.outrasRec;
  });
  return m;
}

function calcFluxo(year){
  const despCats=getDespCats();
  const recCats=getRecCats();
  const base={entradas:0,totSaidas:0,saldoOp:0,saldoIni:0,saldoFin:0};
  recCats.forEach(c=>{ base['r_'+(c.slug||slugify(c.nome))]=0; });
  despCats.forEach(c=>{ base['d_'+(c.slug||slugify(c.nome))]=0; });
  const m=Array.from({length:12},()=>({...base}));

  DATA.forEach(l=>{
    if(!l.dataPgto||getY(l.dataPgto)!==year)return;
    if(l.status!=='Pago'&&l.status!=='Recebido')return;
    if(!inclInvestimentos&&isInvestConta(l.conta))return;
    if((l.doc||'').startsWith('TRANSF#'))return;
    const i=getM(l.dataPgto),v=parseMoney(l.valorLiq);
    if(l.tipo==='R'){
      const rc=recCats.find(c=>c.nome===l.cat);
      const rslug='r_'+(rc?(rc.slug||slugify(rc.nome)):slugify(l.cat));
      m[i][rslug]=(m[i][rslug]||0)+v;
    } else {
      const slug='d_'+catSlug(l.cat);
      m[i][slug]=(m[i][slug]||0)+v;
    }
  });

  m.forEach((r,i)=>{
    r.entradas=recCats.reduce((s,c)=>s+(r['r_'+(c.slug||slugify(c.nome))]||0),0);
    r.totSaidas=despCats.reduce((s,c)=>s+(r['d_'+(c.slug||slugify(c.nome))]||0),0);
    r.saldoOp=r.entradas-r.totSaidas;
    r.saldoIni=i===0?0:m[i-1].saldoFin;
    r.saldoFin=r.saldoIni+r.saldoOp;
  });
  return m;
}

function normalizeConta(conta){
  const raw=String(conta||'').trim();
  if(!raw||raw==='Conta Corrente')return 'Caixa';
  return CONTAS.includes(raw)?raw:'';
}
function parseMoney(v){
  if(typeof v==='number')return Number.isFinite(v)?v:0;
  const raw=String(v??'').trim();
  if(!raw)return 0;
  let s=raw.replace(/\s/g,'').replace(/[R$]/g,'');
  const hasComma=s.includes(','), hasDot=s.includes('.');
  if(hasComma&&hasDot)s=s.replace(/\./g,'').replace(',','.');
  else if(hasComma)s=s.replace(',','.');
  else if(hasDot&&/^-?\d{1,3}(\.\d{3})+$/.test(s))s=s.replace(/\./g,'');
  s=s.replace(/[^0-9.-]/g,'');
  return parseFloat(s)||0;
}
const fmt=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseMoney(v));
const fmtMoneyInput=v=>parseMoney(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

function dateBR(d){
  if(!d)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return`${d.slice(8,10)}/${d.slice(5,7)}/${d.slice(0,4)}`;
  return d;
}
function compToView(v){
  if(!v)return'';
  if(/^\d{4}-\d{2}$/.test(v))return`${v.slice(5)}/${v.slice(0,4)}`;
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return`${v.slice(5,7)}/${v.slice(0,4)}`;
  if(/^\d{2}\/\d{4}$/.test(v))return v;
  return v;
}
function compDisplay(v){
  if(!v)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v.slice(0,7);
  if(/^\d{4}-\d{2}$/.test(v))return v;
  return v;
}
function compFromView(v){
  if(!v)return null;
  const digits=String(v||'').replace(/\D/g,'');
  if(digits.length===6){
    const mm=String(digits.slice(0,2)).padStart(2,'0');
    const yyyy=digits.slice(2);
    return `${yyyy}-${mm}-01`;
  }
  const m=String(v||'').trim().match(/^(\d{1,2})\/(\d{4})$/);
  if(!m)return null;
  const mm=String(m[1]).padStart(2,'0');
  return `${m[2]}-${mm}-01`;
}
function formatCompInput(v){
  const digits=String(v||'').replace(/\D/g,'');
  if(!digits)return '';
  if(digits.length<=2) return digits;
  const mm=digits.slice(0,2);
  const yy=digits.slice(2,6);
  return yy?`${mm}/${yy}`:mm;
}

// Retorna mensagem de erro se o ano estiver fora do intervalo 1900-2100, ou null se ok
function validarAno(dateStr, label){
  if(!dateStr)return null;
  const y=parseInt(String(dateStr).slice(0,4));
  if(!y||isNaN(y))return null;
  if(y<1900||y>2100)return`Ano inválido em "${label}" (${y}). Use um ano entre 1900 e 2100.`;
  return null;
}

  const todos=[...receitas,...despesas].map(r=>toRecorrenteRow(r));
  for(let i=0;i<todos.length;i+=50){await sbFetch('POST','recorrentes',todos.slice(i,i+50));}
  RECORRENTES_RECEITAS=receitas.map(r=>({id:r.id,desc:r.desc,cat:r.cat,sub:r.sub,valor:r.valor,dataVenc:''}));
  RECORRENTES_DESPESAS=despesas.map(r=>({id:r.id,desc:r.desc,cat:r.cat,sub:r.sub,valor:r.valor,dataVenc:''}));
}

function calcExtrato(){
  const conta=filterExtratoConta;
  const contaObj=CONTAS_DATA.find(c=>c.nome===conta);
  const saldoIni=parseFloat(contaObj?.saldo_inicial)||0;
  const prePeriod=DATA.filter(l=>
    l.conta===conta&&(l.status==='Pago'||l.status==='Recebido')&&
    l.dataPgto&&(!filterExtratoInicio||l.dataPgto<filterExtratoInicio)
  );
  const saldoAntes=saldoIni+prePeriod.reduce((s,l)=>s+(l.tipo==='R'?l.valorLiq:-l.valorLiq),0);
  let items=DATA.filter(l=>{
    if(l.conta!==conta||!l.dataPgto||l.status==='Cancelado')return false;
    if(!filterExtratoInclPend&&l.status==='Pendente')return false;
    if(filterExtratoInicio&&l.dataPgto<filterExtratoInicio)return false;
    if(filterExtratoFim&&l.dataPgto>filterExtratoFim)return false;
    return true;
  });
  items.sort((a,b)=>{
    if(a.dataPgto<b.dataPgto)return -1;
    if(a.dataPgto>b.dataPgto)return 1;
    if(sortExtrato.col){
      let va=a[sortExtrato.col]??'',vb=b[sortExtrato.col]??'';
      if(sortExtrato.col==='valorLiq'){va=parseMoney(va);vb=parseMoney(vb);}
      const r=va>vb?1:va<vb?-1:0;
      return sortExtrato.dir==='asc'?r:-r;
    }
    return 0;
  });
  let running=saldoAntes;
  const rows=items.map(l=>{
    running+=(l.tipo==='R'?l.valorLiq:-l.valorLiq);
    return{...l,saldo:running,isPend:l.status==='Pendente'};
  });
  return{rows,saldoAntes,saldoFinal:running};
}

function sortExtratoBy(col){
  if(sortExtrato.col===col){sortExtrato.dir=sortExtrato.dir==='asc'?'desc':'asc';}
  else{sortExtrato.col=col;sortExtrato.dir='asc';}
  renderExtrato(document.getElementById('content'));
}

function drawBarChart(id,labels,series){
  const canvas=document.getElementById(id);if(!canvas)return;
  const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.clientWidth-40||canvas.offsetWidth;
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const PAD={top:20,right:20,bottom:30,left:60},cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const allVals=series.flatMap(s=>s.data),maxV=Math.max(...allVals,0),minV=Math.min(...allVals,0),range=maxV-minV||1;
  const toY=v=>PAD.top+cH-((v-minV)/range*cH),barW=(cW/labels.length)/(series.length+1);
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=PAD.top+(cH/4)*i;ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();const val=maxV-(range/4*i);ctx.fillStyle='#484f58';ctx.font='10px system-ui';ctx.textAlign='right';ctx.fillText(val>=1000?`${(val/1000).toFixed(0)}k`:val.toFixed(0),PAD.left-4,y+3);}
  if(minV<0){const zy=toY(0);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD.left,zy);ctx.lineTo(PAD.left+cW,zy);ctx.stroke();}
  labels.forEach((lbl,li)=>{const xCenter=PAD.left+(li+0.5)*(cW/labels.length);series.forEach((s,si)=>{const x=xCenter-(series.length/2-si)*barW-barW/2,v=s.data[li],y0=toY(0),y1=toY(v),bH=Math.abs(y1-y0)||1;ctx.fillStyle=s.color+'cc';ctx.fillRect(x,Math.min(y0,y1),barW-2,bH);});ctx.fillStyle='#8b949e';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(lbl,xCenter,H-8);});
  let lx=PAD.left;series.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(lx,4,10,8);ctx.fillStyle='#8b949e';ctx.font='10px system-ui';ctx.textAlign='left';ctx.fillText(s.label,lx+13,12);lx+=80;});
}

function drawBarChartSingle(id,labels,data){
  const canvas=document.getElementById(id);if(!canvas)return;
  const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.clientWidth-40||canvas.offsetWidth;
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const PAD={top:15,right:20,bottom:28,left:60},cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const maxV=Math.max(...data,0),minV=Math.min(...data,0),range=maxV-minV||1;
  const toY=v=>PAD.top+cH-((v-minV)/range*cH),barW=cW/labels.length*0.6;
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=PAD.top+(cH/3)*i;ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();const val=maxV-(range/3*i);ctx.fillStyle='#484f58';ctx.font='10px system-ui';ctx.textAlign='right';ctx.fillText(val>=1000?`${(val/1000).toFixed(0)}k`:val.toFixed(0),PAD.left-4,y+3);}
  const zy=toY(0);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD.left,zy);ctx.lineTo(PAD.left+cW,zy);ctx.stroke();
  labels.forEach((lbl,i)=>{const xC=PAD.left+(i+0.5)*(cW/labels.length),v=data[i],y1=toY(v),y0=toY(0),bH=Math.abs(y1-y0)||1;ctx.fillStyle=v>=0?'#39d353bb':'#f85149bb';ctx.beginPath();ctx.roundRect(xC-barW/2,Math.min(y0,y1),barW,bH,[3,3,0,0]);ctx.fill();ctx.fillStyle='#8b949e';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(lbl,xC,H-8);});
}

function drawPieChart(id,data,mode){
  let canvas=document.getElementById(id);if(!canvas)return;
  const origH=canvas.height;
  const nc=canvas.cloneNode(false);
  canvas.parentNode.replaceChild(nc,canvas);
  canvas=nc;
  canvas.height=origH;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||canvas.parentElement?.offsetWidth-40||300;
  const W=canvas.width,H=canvas.height;
  const leg=document.getElementById('pie-legend'),tip=document.getElementById('pie-tooltip');
  if(!data.length){
    ctx.fillStyle='#484f58';ctx.font='13px system-ui';ctx.textAlign='center';
    ctx.fillText((mode||'D')==='R'?'Nenhuma receita lançada':'Nenhuma despesa lançada',W/2,H/2);
    if(leg)leg.innerHTML='';return;
  }
  const COLS=['#39d353','#f778ba','#e3b341','#58a6ff','#bc8cff','#f0883e','#56d364','#79c0ff','#ffa657','#ff7b72'];
  const total=data.reduce((s,d)=>s+d.val,0);
  const cx=W/2,cy=H/2,r=Math.min(W/2,H/2)*0.84,ri=r*0.52;
  const slices=[];let angle=-Math.PI/2;
  data.forEach((d,i)=>{const sweep=(d.val/total)*Math.PI*2;slices.push({start:angle,end:angle+sweep,lbl:d.lbl,val:d.val,color:COLS[i%COLS.length],pct:d.val/total});angle+=sweep;});
  function drawSlices(hov){
    ctx.clearRect(0,0,W,H);
    slices.forEach((s,i)=>{
      const isH=i===hov,off=isH?7:0,mid=(s.start+s.end)/2;
      ctx.save();ctx.translate(Math.cos(mid)*off,Math.sin(mid)*off);
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,isH?r+5:r,s.start,s.end);ctx.closePath();
      ctx.fillStyle=isH?s.color:s.color+'cc';ctx.fill();
      ctx.strokeStyle='#0d1117';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    });
    ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);ctx.fillStyle='#161b22';ctx.fill();
    if(hov>=0&&slices[hov]){
      const s=slices[hov];
      ctx.fillStyle='#e6edf3';ctx.font='bold 14px system-ui';ctx.textAlign='center';ctx.fillText(fmtPct(s.pct),cx,cy-4);
      ctx.fillStyle='#8b949e';ctx.font='11px system-ui';ctx.fillText(fmt(s.val),cx,cy+13);
    }
  }
  drawSlices(-1);
  if(leg){
    leg.innerHTML=slices.map(s=>`<div class="pie-leg-item" onclick="pieClickCat(${JSON.stringify(s.lbl)},${JSON.stringify(mode||'D')})"><span class="pie-leg-dot" style="background:${s.color}"></span><span class="pie-leg-name">${esc(s.lbl)}</span><span class="pie-leg-pct">${fmtPct(s.pct)}</span><span class="pie-leg-val">${fmt(s.val)}</span></div>`).join('');
  }
  function hitTest(cx2,cy2,ex,ey){
    const rect=canvas.getBoundingClientRect();
    const dx=ex-rect.left-cx2,dy=ey-rect.top-cy2,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<ri-2||dist>r+8)return -1;
    let a=Math.atan2(dy,dx);if(a<slices[0].start)a+=Math.PI*2;
    for(let i=0;i<slices.length;i++)if(a>=slices[i].start&&a<=slices[i].end)return i;
    return -1;
  }
  canvas.addEventListener('mousemove',e=>{
    const i=hitTest(cx,cy,e.clientX,e.clientY);
    drawSlices(i);
    if(i>=0&&tip){const s=slices[i];tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';tip.innerHTML=`<strong>${esc(s.lbl)}</strong><br>${fmt(s.val)} <span style="color:#8b949e">(${fmtPct(s.pct)})</span>`;}
    else if(tip)tip.style.display='none';
    canvas.style.cursor=i>=0?'pointer':'default';
  });
  canvas.addEventListener('mouseleave',()=>{drawSlices(-1);if(tip)tip.style.display='none';canvas.style.cursor='default';});
  canvas.addEventListener('click',e=>{const i=hitTest(cx,cy,e.clientX,e.clientY);if(i>=0)pieClickCat(slices[i].lbl,mode||'D');});
}

function renderDRE(c){
  const dre=calcDRE(YEAR);
  const recCats=getRecCats().filter(c=>!isExclDRE(c));
  const despCats=getDespCats().filter(c=>!isExclDRE(c));
  const tot=k=>dre.reduce((s,m)=>s+(m[k]||0),0);
  const mHdr=MONTHS.map(m=>`<th>${m}</th>`).join('');

  // Estado de expansão
  if(!window._dreExpanded) window._dreExpanded={};

  function row(lbl,k,type='normal',groupId=null,parentId=null){
    const isTotal   = type==='total';
    const isSep     = type==='sep';
    const isGroup   = type==='group';
    const isSub     = type==='sub';
    const isResult  = type==='result';

    if(isSep) return `<tr class="sep"><td colspan="14">${lbl}</td></tr>`;

    const expanded = groupId ? (window._dreExpanded[groupId]!==false) : true;
    const hasSubs  = groupId && !parentId;

    const cells=dre.map(m=>{
      const v=m[k]||0;
      return`<td class="${v<0?'neg':v>0?'pos':''}" style="font-size:11.5px">${v!==0?fmt(v):'—'}</td>`;
    }).join('');
    const tv=tot(k);

    let style='';
    let tdStyle=`padding-left:${isSub?40:isGroup?20:12}px`;
    let cls='dr';
    if(isTotal||isResult) cls+=' bold';
    if(isResult) cls+=' hl';
    if(type==='lucro') cls+=' tot';

    // Linha oculta se for subcategoria de grupo fechado
    if(parentId&&window._dreExpanded[parentId]===false) style='display:none';

    const toggleBtn = hasSubs ? `<span onclick="toggleDRE('${groupId}')" style="cursor:pointer;margin-right:6px;font-size:10px;display:inline-block;width:12px">${expanded?'▼':'▶'}</span>` : `<span style="display:inline-block;width:18px"></span>`;

    return`<tr class="${cls}" id="dre-row-${groupId||k}" style="${style}">
      <td style="${tdStyle}">${toggleBtn}${lbl}</td>${cells}
      <td class="${tv<0?'neg':tv>0?'pos':''} tc" style="font-weight:${isTotal||isResult||type==='lucro'?700:400}">${tv!==0?fmt(tv):'—'}</td>
    </tr>`;
  }

  function groupRows(cat, tipo){
    const k = tipo==='R' ? 'r_'+(cat.slug||slugify(cat.nome)) : 'd_'+(cat.slug||slugify(cat.nome));
    const gid = k;
    const subs = (cat.subs||[]).sort((a,b)=>a.ordem-b.ordem);
    let html = row(cat.nome, k, 'group', gid);
    subs.forEach(sub=>{
      const sk = tipo==='R' ? 'rs_'+(sub.slug||slugify(sub.nome)) : 'ds_'+(sub.slug||slugify(sub.nome));
      html += row(sub.nome, sk, 'sub', sk, gid);
    });
    return html;
  }

  // Receitas operacionais (exceto financeiras e outras)
  const recFinCat  = recCats.find(c=>(c.slug||slugify(c.nome))==='receita_financeira');
  const outrasCat  = recCats.find(c=>(c.slug||slugify(c.nome))==='outras_receitas');
  const recOpCats  = recCats.filter(c=>c!==recFinCat&&c!==outrasCat);

  // Grupos de despesas — dinâmico: Pessoal e Impostos e Taxas têm seções próprias, resto vai em Despesas Operacionais
  const impostoCat  = despCats.find(c=>(c.slug||slugify(c.nome))==='impostos_e_taxas');
  const pessoalCat  = despCats.find(c=>(c.slug||slugify(c.nome))==='pessoal');
  const EXCL_SLUGS  = ['pessoal','impostos_e_taxas'];
  const despOpCats  = despCats.filter(c=>!EXCL_SLUGS.includes(c.slug||slugify(c.nome)));

  const g=(cat,tipo)=>cat?groupRows(cat,tipo):'';

  c.innerHTML=`
  <style>
    .dr td{transition:background .1s}
    .dr.group-hdr td:first-child{cursor:pointer}
    .dr.group-hdr:hover td{background:rgba(255,255,255,.03)}
  </style>
  <div class="tbl-wrap">
    <div class="tbl-hdr" style="display:flex;align-items:center;justify-content:space-between">
      <div class="sec-ttl">DRE — Regime de Competência <span class="yr-pill">${YEAR}</span></div>
      <button class="btn btn-ghost" style="font-size:12px" onclick="toggleAllDRE()">⊞ Expandir/Recolher tudo</button>
    </div>
    <div class="tbl-scroll"><table class="fin-tbl resizable">${renderFinColgroup()}<thead>${renderFinHead()}</thead>
      <tbody>
        ${row('RECEITAS OPERACIONAIS','','sep')}
        ${recOpCats.map(cat=>groupRows(cat,'R')).join('')}
        ${row('(=) RECEITA OPERACIONAL BRUTA','recOpBruta','result')}

        ${impostoCat?`${row('IMPOSTOS E TAXAS','','sep')}${g(impostoCat,'D')}`:''}
        ${row('(=) RECEITA OPERACIONAL LÍQUIDA','recOpLiq','result')}

        ${pessoalCat?`${row('CUSTO COM PESSOAL','','sep')}${g(pessoalCat,'D')}${row('(=) CUSTO COM PESSOAL','cusPessoal','total')}`:''}
        ${row('(=) LUCRO OPERACIONAL BRUTO','lucOpBruto','result')}

        ${despOpCats.length?`${row('DESPESAS OPERACIONAIS','','sep')}${despOpCats.map(cat=>g(cat,'D')).join('')}${row('(=) DESPESAS OPERACIONAIS','despOp','total')}`:''}
        ${row('(=) RESULTADO OPERACIONAL','resOp','result')}

        ${recFinCat?`${row('RECEITAS FINANCEIRAS','','sep')}${groupRows(recFinCat,'R')}`:''}
        ${outrasCat?`${row('OUTRAS RECEITAS','','sep')}${groupRows(outrasCat,'R')}`:''}

        ${row('RESULTADO FINAL','ll','lucro')}
      </tbody>
    </table></div>
  </div>`;
}

function toggleDRE(groupId){
  if(!window._dreExpanded) window._dreExpanded={};
  window._dreExpanded[groupId] = window._dreExpanded[groupId]===false ? true : false;
  // Toggle visibility of sub rows
  document.querySelectorAll(`[id^="dre-row-"]`).forEach(tr=>{
    // Check if this row's parent is the toggled group
    const cells=tr.querySelectorAll('td');
    if(!cells.length) return;
  });
  // Re-render to apply
  renderDRE(document.getElementById('content'));
}

function toggleAllDRE(){
  if(!window._dreExpanded) window._dreExpanded={};
  const allExpanded=Object.values(window._dreExpanded).every(v=>v!==false);
  // Toggle all known groups
  const recCats=getRecCats(), despCats=getDespCats();
  [...recCats,...despCats].forEach(c=>{
    const k=(c.tipo==='R'?'r_':'d_')+(c.slug||slugify(c.nome));
    window._dreExpanded[k]=allExpanded?false:true;
  });
  renderDRE(document.getElementById('content'));
}

function renderFluxo(c){
  const f=calcFluxo(YEAR);
  const recCats=getRecCats();
  const despCats=getDespCats();
  const tot=k=>f.reduce((s,m)=>s+(m[k]||0),0);

  function row(lbl,k,bold,indent,cls=''){
    const cells=f.map(m=>`<td class="${(m[k]||0)<0?'neg':'pos'}">${fmt(m[k]||0)}</td>`).join('');
    const tv=tot(k);
    return`<tr class="dr${bold?' bold':''} ${cls}"><td style="padding-left:${indent?28:12}px">${lbl}</td>${cells}<td class="${tv<0?'neg':'pos'} tc">${fmt(tv)}</td></tr>`;
  }
  const sep=lbl=>`<tr class="sep"><td colspan="14">${lbl}</td></tr>`;

  const entradasRows=recCats.filter(cat=>(cat.slug||slugify(cat.nome))!==TRANSF_SLUG).map(cat=>{
    const k='r_'+(cat.slug||slugify(cat.nome));
    return row(cat.nome,k,false,true);
  }).join('');

  const saidasRows=despCats.filter(cat=>(cat.slug||slugify(cat.nome))!==TRANSF_SLUG).map(cat=>{
    const k='d_'+(cat.slug||slugify(cat.nome));
    return row(cat.nome,k,false,true);
  }).join('');

  // Per-account saldo calculation
  const paidData=DATA.filter(l=>(l.status==='Pago'||l.status==='Recebido')&&l.dataPgto&&getY(l.dataPgto)===YEAR&&(inclInvestimentos||!isInvestConta(l.conta)));
  const contaFlows={};
  paidData.forEach(l=>{const c=l.conta||'(Sem conta)';if(!contaFlows[c])contaFlows[c]=Array(12).fill(0);});
  // Include destination accounts from new-style single-record transfers
  paidData.filter(l=>(l.doc||'').startsWith('TRANSF#')&&(l.obs||'').startsWith('TRANSF_DEST:')).forEach(l=>{
    const dest=l.obs.slice(12);if(dest&&!contaFlows[dest])contaFlows[dest]=Array(12).fill(0);
  });
  const contaSet=[...new Set(Object.keys(contaFlows))].sort();
  paidData.forEach(l=>{
    const i=getM(l.dataPgto),v=parseMoney(l.valorLiq);
    const conta=l.conta||'(Sem conta)';
    contaFlows[conta][i]+=(l.tipo==='R'?v:-v);
    // New-style transfer: also credit destination account
    if((l.doc||'').startsWith('TRANSF#')&&(l.obs||'').startsWith('TRANSF_DEST:')){
      const dest=l.obs.slice(12);if(dest)contaFlows[dest][i]+=v;
    }
  });
  const contaRows=contaSet.map(conta=>{
    const vals=contaFlows[conta];
    const cells=vals.map(v=>`<td class="${v<0?'neg':'pos'}">${fmt(v)}</td>`).join('');
    const tv=vals.reduce((s,v)=>s+v,0);
    return`<tr class="dr"><td style="padding-left:28px">${esc(conta)}</td>${cells}<td class="${tv<0?'neg':'pos'} tc">${fmt(tv)}</td></tr>`;
  }).join('');

  // Per-account closing balance: saldo_inicial + cumulative monthly flows
  const contaSaldoFin={};
  contaSet.forEach(conta=>{
    const ini=parseFloat(CONTAS_DATA.find(c=>c.nome===conta)?.saldo_inicial)||0;
    let cum=ini;
    contaSaldoFin[conta]=contaFlows[conta].map(v=>{cum+=v;return cum;});
  });
  const totalSaldoFinVals=Array(12).fill(0);
  contaSet.forEach(conta=>contaSaldoFin[conta].forEach((v,i)=>totalSaldoFinVals[i]+=v));
  const mkBalRow=(lbl,vals,bold,indent,cls='')=>{
    const cells=vals.map(v=>`<td class="${v<0?'neg':'pos'}">${fmt(v)}</td>`).join('');
    const tv=vals[vals.length-1];
    return`<tr class="dr${bold?' bold':''} ${cls}"><td style="padding-left:${indent?28:12}px">${lbl}</td>${cells}<td class="${tv<0?'neg':'pos'} tc">${fmt(tv)}</td></tr>`;
  };
  const contaSaldoFinRows=contaSet.map(conta=>mkBalRow(esc(conta),contaSaldoFin[conta],false,true)).join('');
  const totalSaldoFinRow=mkBalRow('SALDO FINAL TOTAL',totalSaldoFinVals,true,false,'tot-bal');

  let projSection='';
  if(showFluxoProj){
    const pendData=DATA.filter(l=>{
      if(l.status!=='Pendente')return false;
      const d=l.dataPgto||l.dataComp;
      return d&&getY(d)===YEAR;
    }).filter(l=>inclInvestimentos||!isInvestConta(l.conta));
    const projEnt=Array(12).fill(0);
    const projSai=Array(12).fill(0);
    pendData.forEach(l=>{
      const d=l.dataPgto||l.dataComp;
      const i=getM(d);
      if(i==null||i<0||i>11)return;
      const v=parseMoney(l.valorLiq);
      if(l.tipo==='R')projEnt[i]+=v;
      else projSai[i]+=v;
    });
    const projSaldoOp=projEnt.map((e,i)=>e-projSai[i]);
    let cumProj=0;
    const projSaldoFin=f.map((m,i)=>{cumProj+=projSaldoOp[i];return m.saldoFin+cumProj;});
    const mkRow=(lbl,vals,bold,cls='')=>{
      const cells=vals.map(v=>`<td class="${v<0?'neg':'pos'}">${fmt(v)}</td>`).join('');
      const tv=vals.reduce((s,v)=>s+v,0);
      return`<tr class="dr${bold?' bold':''} ${cls}"><td style="padding-left:12px">${lbl}</td>${cells}<td class="${tv<0?'neg':'pos'} tc">${fmt(tv)}</td></tr>`;
    };
    projSection=`<tr class="sep proj-sep"><td colspan="14">📊 PROJEÇÃO — Lançamentos Pendentes</td></tr>
    ${mkRow('Entradas Previstas',projEnt,false,'proj-row')}
    ${mkRow('Saídas Previstas',projSai,false,'proj-row')}
    ${mkRow('Saldo Final Projetado',projSaldoFin,true,'proj-tot')}`;
  }

  c.innerHTML=`<div class="tbl-wrap"><div class="tbl-hdr" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div class="sec-ttl">Fluxo de Caixa — Regime de Caixa <span class="yr-pill">${YEAR}</span></div><div style="display:flex;gap:6px"><button class="btn btn-ghost" style="font-size:12px;${showFluxoProj?'border-color:#58a6ff;color:#58a6ff':''}" onclick="toggleFluxoProj()">📊 ${showFluxoProj?'Ocultar projetado':'Fluxo Projetado'}</button><button class="btn btn-ghost" style="font-size:12px" onclick="toggleInclInvest()">💼 ${inclInvestimentos?'Ocultar investimentos':'Incluir investimentos'}</button></div></div>
    <div class="tbl-scroll"><table class="fin-tbl resizable">${renderFinColgroup()}<thead>${renderFinHead()}</thead><tbody>
    ${sep('ENTRADAS')}
    ${entradasRows}
    ${row('TOTAL ENTRADAS','entradas',true,false,'hl')}
    ${sep('SAÍDAS')}
    ${saidasRows}
    ${row('TOTAL SAÍDAS','totSaidas',true,false)}
    ${sep('SALDOS')}
    <tr class="sep"><td colspan="14" style="padding-left:28px;font-size:9px;color:var(--tx3)">VARIAÇÃO NO PERÍODO</td></tr>
    ${contaRows}
    ${row('RESULTADO TOTAL','saldoOp',true,false,'tot')}
    <tr class="sep"><td colspan="14" style="padding-left:28px;font-size:9px;color:var(--blue)">SALDO FINAL POR CONTA</td></tr>
    ${contaSaldoFinRows}
    ${totalSaldoFinRow}
    ${projSection}
    </tbody></table></div></div>`;
}

const LAN_COL_WIDTHS_KEY='financeiro_lancamentos_col_widths';
const LAN_COLS=[
  {id:'sel',w:42,min:38},
  {id:'tipo',lbl:'Tipo',w:84,min:70},
  {id:'dataPgto',lbl:'Pagamento',sort:'dataPgto',w:112,min:92},

];
let lanColWidths=loadLanColWidths();

function loadLanColWidths(){
  try{
    const stored=localStorage.getItem(LAN_COL_WIDTHS_KEY);
    const parsed=stored?JSON.parse(stored):{};
    return Object.fromEntries(LAN_COLS.map(c=>{
      const saved=parseInt(parsed[c.id],10);
      return [c.id,Math.max(c.min,Number.isFinite(saved)?saved:c.w)];
    }));
  }catch(e){
    return Object.fromEntries(LAN_COLS.map(c=>[c.id,c.w]));
  }
}

function saveLanColWidths(){
  try{localStorage.setItem(LAN_COL_WIDTHS_KEY,JSON.stringify(lanColWidths));}
  catch(e){console.warn('Falha ao salvar larguras das colunas',e);}
}

function renderLanColgroup(){
  return `<colgroup>${LAN_COLS.map(c=>`<col data-col="${c.id}" style="width:${lanColWidths[c.id]||c.w}px">`).join('')}</colgroup>`;
}

function renderLanHeadCell(col){
  const width=lanColWidths[col.id]||col.w;
  const resize=`<span class="col-resize" title="Arraste para ajustar a largura" onclick="event.stopPropagation()" onmousedown="startLanColResize(event,'${col.id}')"></span>`;
  if(!col.sort)return `<th class="lan-th" data-col="${col.id}" style="width:${width}px">${col.lbl||''}${resize}</th>`;
  const cls = sortLan.col===col.sort ? sortLan.dir : '';
  return `<th class="lan-th th-sort ${cls}" data-col="${col.id}" style="width:${width}px" onclick="sortLancamentos('${col.sort}')">${col.lbl}<span class="sort-ico"></span>${resize}</th>`;
}

function startLanColResize(e,colId){
  e.preventDefault();e.stopPropagation();
  const ci=LAN_COLS.findIndex(c=>c.id===colId);if(ci<0)return;
  const col=LAN_COLS[ci],nextCol=LAN_COLS[ci+1]||null;
  const startX=e.clientX,startW=lanColWidths[colId]||col.w,startNextW=nextCol?(lanColWidths[nextCol.id]||nextCol.w):null;
  document.body.classList.add('resizing-col');
  const onMove=ev=>{
    const n=Math.max(col.min,startW+(ev.clientX-startX));
    lanColWidths[colId]=n;

function sortData(arr, col, dir){
  return [...arr].sort((a,b)=>{
    let va=a[col]??'', vb=b[col]??'';
    if(col==='valorLiq'||col==='valorBruto'||col==='valor'){va=parseMoney(va);vb=parseMoney(vb);}
    const r = va>vb?1:va<vb?-1:0;
    return dir==='asc'?r:-r;
  });
}

function thSort(lbl, col, sortObj, renderFn){
  const cls = sortObj.col===col ? sortObj.dir : '';
  return `<th class="th-sort ${cls}" onclick="${renderFn}('${col}')">${lbl}<span class="sort-ico"></span></th>`;
}

function sortLancamentos(col){
  if(sortLan.col===col)sortLan.dir=sortLan.dir==='asc'?'desc':'asc';
  else{sortLan.col=col;sortLan.dir='desc';}
  renderLancamentos(document.getElementById('content'));
}

function applyLanFilter(){renderLancamentos(document.getElementById('content'));}
function dateSearchText(d){
  if(!d)return '';
  const raw=String(d);
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
    const br=`${raw.slice(8,10)}/${raw.slice(5,7)}/${raw.slice(0,4)}`;
    const brDash=br.replace(/\//g,'-');
    return `${raw} ${br} ${brDash}`;
  }
  if(/^\d{4}-\d{2}$/.test(raw)){
    const br=`${raw.slice(5,7)}/${raw.slice(0,4)}`;
    return `${raw} ${br} ${br.replace('/','-')}`;
  }
  return raw;
}
function lanSearchText(l){
  return [
    l.desc,l.cat,l.sub,l.conta,l.status,l.doc,l.forma,
    l.dataPgto,dateSearchText(l.dataPgto)
  ].filter(Boolean).join(' ').toLowerCase();
}
function filterLanTbody(){
  let filtered=DATA.filter(l=>{
    const isTransfEntry=(l.doc||'').startsWith('TRANSF#');
    if(filterTipo==='T'){if(!isTransfEntry)return false;}
    else if(filterTipo){if(l.tipo!==filterTipo||isTransfEntry)return false;}
    if(filterStatus&&l.status!==filterStatus)return false;
    if(filterComp&&(l.dataComp||'').slice(0,7)!==filterComp)return false;
    if(filterConta&&(l.conta||'')!==filterConta)return false;
    if(filterCat&&l.cat!==filterCat)return false;
    if(filterSub&&(l.sub||'')!==filterSub)return false;
    if(filterBusca&&!lanSearchText(l).includes(filterBusca.toLowerCase()))return false;
    return true;
  });
  filtered=sortData(filtered,sortLan.col,sortLan.dir);
  const cb=document.getElementById('count-badge');
  if(cb)cb.textContent=`${filtered.length} lançamentos`;
  const tb=document.getElementById('lan-tbody');
  if(!tb)return;
  if(!filtered.length){tb.innerHTML=`<tr><td colspan="${LAN_COLS.length}" class="empty-row">Nenhum lançamento encontrado</td></tr>`;onLanCheck();return;}
  tb.innerHTML=filtered.map(l=>{
    const checked=selectedLanIds.has(l.id)?'checked':'';
    const isTransf=(l.doc||'').startsWith('TRANSF#');
    const tipoCls=isTransf?'t':l.tipo==='R'?'r':'d';
    const tipoLbl=isTransf?'↔ Transf':l.tipo==='R'?'▲ Rec':'▼ Desp';
    return `<tr class="lr" id="lan-row-${l.id}">
      <td><input type="checkbox" class="lan-chk" value="${l.id}" ${checked} onchange="onLanCheck()" style="width:15px;height:15px;cursor:pointer"/></td>
      <td onclick="openEdit('${l.id}')"><span class="tp ${tipoCls}">${tipoLbl}</span></td>
      <td onclick="openEdit('${l.id}')">${dateBR(l.dataPgto)||'—'}</td>
      <td onclick="openEdit('${l.id}')">${compDisplay(l.dataComp)||'—'}</td>
      <td onclick="openEdit('${l.id}')"><span class="ct">${esc(l.cat)}</span></td>
      <td class="dc" onclick="openEdit('${l.id}')">${esc(l.sub||'—')}</td>
      <td class="dc" onclick="openEdit('${l.id}')">${esc(l.desc||'—')}</td>
      <td onclick="openEdit('${l.id}')">${esc(l.conta||'—')}</td>
      <td class="vc ${l.tipo==='R'?'r':'d'}" onclick="openEdit('${l.id}')">${fmt(l.valorLiq)}</td>
      <td><span onclick="toggleStatus('${l.id}')" style="cursor:pointer" title="Clique para alternar status">${badge(l.status)}</span></td>
      <td style="white-space:nowrap">
        ${isTransf?'':`<button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="openEdit('${l.id}')">✏️</button>`}
        ${isTransf?'':`<button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" title="Duplicar" onclick="duplicarLancamento('${l.id}')">⧉</button>`}
        <button class="btn" style="padding:4px 8px;font-size:12px;background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.2)" onclick="deleteItem('${l.id}')">🗑️</button>
      </td></tr>`;
  }).join('');
  onLanCheck();
  renderSaldoCards();
}

function renderSaldoCards(){
  const el=document.getElementById('saldo-cards');
  if(!el||!CONTAS_DATA.length)return;
  const contasVis=CONTAS_DATA.filter(c=>(c.tipo||'corrente')==='corrente');
  const cards=contasVis.map(conta=>{
    const lan=DATA.filter(l=>l.conta===conta.nome);
    const ini=parseFloat(conta.saldo_inicial)||0;
    const realizados=lan.filter(l=>l.status==='Pago'||l.status==='Recebido')
      .reduce((s,l)=>s+(l.tipo==='R'?l.valorLiq:-l.valorLiq),0);
    const pendentes=lan.filter(l=>l.status==='Pendente')
      .reduce((s,l)=>s+(l.tipo==='R'?l.valorLiq:-l.valorLiq),0);
    // Credits from new-style single-record transfers where this account is the destination
    const transfCredReal=DATA.filter(l=>(l.doc||'').startsWith('TRANSF#')&&(l.obs||'').startsWith('TRANSF_DEST:')&&l.obs.slice(12)===conta.nome&&(l.status==='Pago'||l.status==='Recebido')).reduce((s,l)=>s+parseMoney(l.valorLiq),0);
    const transfCredPend=DATA.filter(l=>(l.doc||'').startsWith('TRANSF#')&&(l.obs||'').startsWith('TRANSF_DEST:')&&l.obs.slice(12)===conta.nome&&l.status==='Pendente').reduce((s,l)=>s+parseMoney(l.valorLiq),0);
    const atual=ini+realizados+transfCredReal;
    const projetado=atual+pendentes+transfCredPend;
    return{nome:conta.nome,atual,projetado};
  });
  el.innerHTML=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px 18px">
  <div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Saldo por Conta</div>
  <div style="display:flex;gap:8px">
    ${cards.map(c=>`<div style="flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px 12px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.nome)}</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:4px;margin-bottom:2px">
        <span style="font-size:10px;color:var(--tx3)">Atual</span>
        <span style="font-size:12px;font-weight:700;color:${c.atual>=0?'var(--teal)':'var(--red)'};white-space:nowrap">${fmt(c.atual)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:4px">
        <span style="font-size:10px;color:var(--tx3)">Projetado</span>
        <span style="font-size:11px;font-weight:600;color:${c.projetado>=0?'var(--teal)':'var(--red)'};white-space:nowrap">${fmt(c.projetado)}</span>
      </div>
    </div>`).join('')}
  </div></div>`;
}

function onLanCheck(){
  const allBoxes=[...document.querySelectorAll('.lan-chk')];
  allBoxes.forEach(c=>{
    if(c.checked)selectedLanIds.add(c.value);
    else selectedLanIds.delete(c.value);
  });
  const btn=document.getElementById('lan-del-btn');
  const bulkBar=document.getElementById('lan-bulk-edit');
  const countEl=document.getElementById('lan-count');
  const totalEl=document.getElementById('lan-sel-total');
  const selAll=document.getElementById('lan-sel-all');
  const selectedItems=[...selectedLanIds].map(id=>DATA.find(l=>l.id===id)).filter(Boolean);
  const clearBtn=document.getElementById('lan-clear-btn');
  if(btn)btn.style.display=selectedLanIds.size>0?'inline-flex':'none';
  if(clearBtn)clearBtn.style.display=selectedLanIds.size>0?'inline-flex':'none';
  if(bulkBar)bulkBar.style.display=selectedLanIds.size>0?'block':'none';
  if(countEl)countEl.textContent=selectedLanIds.size>0?`${selectedLanIds.size} selecionado(s)`:'';
  if(totalEl){
    const total=selectedItems.reduce((s,item)=>{
      const valor=parseMoney(item.valorLiq);
      return s+(item.tipo==='D'?-valor:valor);
    },0);
    totalEl.style.display=selectedLanIds.size>0?'inline-block':'none';
    totalEl.textContent=`Total selecionado: ${fmt(total)}`;
    totalEl.style.color=total<0?'var(--red)':'var(--teal)';
    totalEl.style.borderColor=total<0?'rgba(248,81,73,.25)':'rgba(57,211,83,.25)';
    totalEl.style.background=total<0?'rgba(248,81,73,.08)':'rgba(57,211,83,.08)';
  }
  if(selAll)selAll.checked=allBoxes.length>0 && allBoxes.every(c=>selectedLanIds.has(c.value));
}

async function salvarSaldoIni(id,inputVal){

async function deleteSelectedLancamentos(){
  const ids=[...selectedLanIds];
  if(!ids.length){toast('Selecione pelo menos um lançamento','err');return;}
  if(!confirm(`Excluir ${ids.length} lançamento(s) selecionados? Esta ação não pode ser desfeita.`))return;
  setSyncStatus('loading',`Excluindo ${ids.length} lançamento(s)...`);
  let ok=0,err=0;
  for(const id of ids){
    try{await dbDelete(id);DATA=DATA.filter(l=>l.id!==id);ok++;}
    catch(e){err++;console.error(e);}
  }
  selectedLanIds.clear();
  setSyncStatus('ok',`${DATA.length} registros`);
  buildNav();render();
  toast(`✓ ${ok} excluído(s)${err?` — ${err} erro(s)`:''}`,'err');
}

async function applyBulkEditSelectedLancamentos(){
  const ids=[...selectedLanIds];
  if(!ids.length){toast('Selecione pelo menos um lançamento','err');return;}

  const dataPgto=document.getElementById('lan-bulk-data')?.value||'';
  const compRaw=document.getElementById('lan-bulk-comp')?.value||'';
  const contaRaw=document.getElementById('lan-bulk-conta')?.value||'';
  const statusRaw=document.getElementById('lan-bulk-status')?.value||'';
  const dataComp=compRaw?compFromView(compRaw):'';
  const conta=contaRaw?normalizeConta(contaRaw):'';
  const items=DATA.filter(l=>ids.includes(l.id));

  if(compRaw&&!dataComp){toast('Competência inválida. Use MM/AAAA.','err');return;}
  if(contaRaw&&(!conta||!CONTAS.includes(conta))){toast('Selecione uma conta cadastrada.','err');return;}
  if(statusRaw&&statusRaw!=='__QUITAR__'&&!STATUS.includes(statusRaw)){toast('Status inválido.','err');return;}
  if(statusRaw==='Recebido'&&items.some(l=>l.tipo==='D')){toast('Use "Recebido/Pago conforme tipo" para seleções com despesas.','err');return;}
  if(statusRaw==='Pago'&&items.some(l=>l.tipo==='R')){toast('Use "Recebido/Pago conforme tipo" para seleções com receitas.','err');return;}
  if(!dataPgto&&!dataComp&&!conta&&!statusRaw){toast('Informe pelo menos uma alteração para aplicar.','err');return;}

  const resumo=[];
  if(dataPgto)resumo.push(`data ${dataPgto}`);
  if(dataComp)resumo.push(`competência ${compToView(dataComp)}`);
  if(conta)resumo.push(`conta ${conta}`);
  if(statusRaw)resumo.push(`status ${statusRaw==='__QUITAR__'?'Recebido/Pago conforme tipo':statusRaw}`);
  if(!confirm(`Aplicar em ${items.length} lançamento(s)?\n${resumo.join('\n')}`))return;

  const btn=document.getElementById('lan-bulk-apply');
  if(btn){btn.disabled=true;btn.textContent='Aplicando...';}
  setSyncStatus('loading',`Atualizando ${items.length}...`);
  let ok=0,err=0;
  for(const item of items){
    const patch={};
    if(dataPgto)patch.data_pgto=dataPgto;
    if(dataComp)patch.data_comp=dataComp;
    if(conta)patch.conta=conta;
    if(statusRaw)patch.status=statusRaw==='__QUITAR__'?(item.tipo==='R'?'Recebido':'Pago'):statusRaw;
    try{
      await sbFetch('PATCH',`${TABLE}?id=eq.${item.id}`,patch);
      const idx=DATA.findIndex(l=>l.id===item.id);
      if(idx>=0){
        if(dataPgto)DATA[idx].dataPgto=dataPgto;
        if(dataComp)DATA[idx].dataComp=dataComp;
        if(conta)DATA[idx].conta=conta;
        if(patch.status)DATA[idx].status=patch.status;
      }
      ok++;
    }catch(e){err++;console.error(e);}
  }
  if(btn){btn.disabled=false;btn.textContent='✓ Aplicar alterações';}
  selectedLanIds.clear();
  setSyncStatus(err?'err':'ok',err?`${err} erro(s)`:`${DATA.length} registros`);
  buildNav();render();
  toast(`✓ ${ok} lançamento(s) atualizado(s)${err?` — ${err} erro(s)`:''}` ,err?'err':'ok');
}

async function baixarEmLote(){
  const chks=[...document.querySelectorAll('.pend-chk:checked')];
  if(!chks.length){toast('Selecione pelo menos um lançamento','err');return;}
  const data=document.getElementById('lote-data').value;
  if(!data){toast('Informe a data de pagamento/recebimento','err');return;}
  const ids=chks.map(c=>c.value);
  const items=DATA.filter(l=>ids.includes(l.id));
  const tot=items.reduce((s,l)=>s+parseMoney(l.valorLiq),0);
  if(!confirm(`Baixar ${items.length} lançamento(s) totalizando ${fmt(tot)}?\nData: ${data}`))return;

  setSyncStatus('loading',`Baixando ${items.length}...`);
  let ok=0,err=0;
  for(const item of items){
    const novoStatus=item.tipo==='R'?'Recebido':'Pago';
    try{
      await sbFetch('PATCH',`lancamentos?id=eq.${item.id}`,{status:novoStatus,data_pgto:data});
      const idx=DATA.findIndex(l=>l.id===item.id);
      if(idx>=0){DATA[idx].status=novoStatus;DATA[idx].dataPgto=data;}
      ok++;
    }catch(e){err++;console.error(e);}
  }
  setSyncStatus('ok',`${DATA.length} registros`);
  buildNav();render();
  toast(`✓ ${ok} baixado(s)${err?` — ${err} erro(s)`:''}!`,'ok');
}

async function deletarEmLote(){
  const chks=[...document.querySelectorAll('.pend-chk:checked')];
  if(!chks.length){toast('Selecione pelo menos um lançamento','err');return;}
  const ids=chks.map(c=>c.value);
  const items=DATA.filter(l=>ids.includes(l.id));
  const tot=items.reduce((s,l)=>s+parseMoney(l.valorLiq),0);
  if(!confirm(`Excluir ${items.length} lançamento(s) pendente(s) totalizando ${fmt(tot)}?`))return;

  setSyncStatus('loading',`Excluindo ${items.length}...`);
  let ok=0,err=0;
  for(const item of items){
    try{
      await dbDelete(item.id);
      ok++;
    }catch(e){err++;console.error(e);}
  }
  DATA=DATA.filter(l=>!ids.includes(l.id));
  setSyncStatus('ok',`${DATA.length} registros`);
  buildNav();render();
  toast(`✓ ${ok} excluído(s)${err?` — ${err} erro(s)`:''}!`,'err');
}

    render();toast(`Conta "${conta.nome}" removida.`);

function setFormTipo(t){formData.tipo=t;formData.cat='';formData.sub='';buildForm();}
function syncFormValorLiq(){
  const bruto=parseMoney(formData.valorBruto);
  const ded=parseMoney(formData.ded);
  formData.valorLiq=fmtMoneyInput(Math.max(0,bruto-ded));
  const liqEl=document.getElementById('form-valor-liq');
  if(liqEl)liqEl.value=formData.valorLiq;
  updateFormTotal();
}
function syncFormDedFromLiq(){
  const bruto=parseMoney(formData.valorBruto);
  const liq=parseMoney(formData.valorLiq);
  if(bruto>0){
    formData.ded=fmtMoneyInput(Math.max(0,bruto-liq));
    const dedEl=document.getElementById('form-ded');
    if(dedEl)dedEl.value=formData.ded;
  }
  updateFormTotal();
}
function updateFormTotal(){const el=document.getElementById('form-total');if(el)el.textContent=fmt(parseMoney(formData.valorLiq||0)+parseMoney(formData.valorJuros||0));}

function validateCatSub(tipo, cat, sub){
  const cats = CATS_DATA[tipo]||[];
  const catObj = cats.find(c=>c.nome===cat);
  if(!cat) return 'Selecione uma categoria.';
  if(!catObj) return `Categoria "${cat}" não está cadastrada.`;
  if(sub){
    const subObj=(catObj.subs||[]).find(s=>s.nome===sub);
    if(!subObj) return `Subcategoria "${sub}" não está cadastrada em "${cat}".`;
  }
  return null;
}

async function baixarParcial(){
  if(!editingId){toast('Salve o lançamento antes de baixar parcialmente.','err');return;}
  const original=DATA.find(l=>l.id===editingId);
  if(!original){toast('Lançamento original não encontrado.','err');return;}
  const total=parseMoney(formData.valorLiq);
  if(total<=0){toast('Valor líquido inválido.','err');return;}

  const valorTxt=prompt(`Valor ${formData.tipo==='R'?'recebido':'pago'} parcialmente:`,fmtMoneyInput(total));
  if(valorTxt===null)return;
  const valorParcial=parseMoney(valorTxt);
  if(valorParcial<=0||valorParcial>=total){toast(`Informe um valor maior que zero e menor que ${fmt(total)}.`,'err');return;}

  const dataDefault=formData.dataPgto||new Date().toISOString().slice(0,10);
  const data=prompt(`Data do ${formData.tipo==='R'?'recebimento':'pagamento'} parcial (AAAA-MM-DD):`,dataDefault);
  if(data===null)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(data)){toast('Informe a data no formato AAAA-MM-DD.','err');return;}

  formData.conta=normalizeConta(formData.conta);
  if(!formData.conta||!CONTAS.includes(formData.conta)){toast('Selecione uma conta bancária cadastrada.','err');return;}
  const canonicalComp=compFromView(formData.dataCompView)||formData.dataComp;
  if(!canonicalComp){toast('Informe a competência antes da baixa parcial.','err');return;}
  const catErr=validateCatSub(formData.tipo,formData.cat,formData.sub);
  if(catErr){toast(catErr,'err');return;}

  const restante=+(total-valorParcial).toFixed(2);
  const novoStatus=formData.tipo==='R'?'Recebido':'Pago';
  const acaoTxt=formData.tipo==='R'?'recebido':'pago';
  const obsBase=formData.obs||'';
  const docBase=formData.doc||'';
  const dataVencOriginal=original.dataPgto||formData.dataPgto||'';
  const lancParcial={
    ...formData,
    dataComp:canonicalComp,
    dataPgto:data,
    valorBruto:valorParcial,
    ded:0,
    valorLiq:valorParcial,
    valorJuros:'',
    status:novoStatus,
    obs:[obsBase,`[baixa parcial de ${fmt(total)}; saldo gerado ${fmt(restante)}]`].filter(Boolean).join(' ')
  };
  const lancRestante={
    ...formData,
    id:newId(),
    dataComp:lancParcial.dataComp,
    dataPgto:dataVencOriginal,
    valorBruto:restante,
    ded:0,
    valorLiq:restante,
    valorJuros:'',
    status:'Pendente',
    desc:`${formData.desc||'Lançamento'} — saldo restante`,
    doc:docBase?`${docBase}-SALDO`:'',
    obs:[obsBase,`[saldo restante da baixa parcial de ${dateBR(data)}: ${fmt(restante)}]`].filter(Boolean).join(' ')
  };

  if(!confirm(`Confirmar baixa parcial?\n${novoStatus}: ${fmt(valorParcial)} em ${dateBR(data)}\nSaldo pendente: ${fmt(restante)}`))return;

  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='Baixando...';}
  setSyncStatus('loading','Baixando parcialmente...');
  try{
    await dbUpdate(lancParcial);
    const savedRestante=await dbInsert(lancRestante);
    const idx=DATA.findIndex(l=>l.id===editingId);
    if(idx>=0)DATA[idx]={...lancParcial};
    DATA.unshift(savedRestante?fromRow(savedRestante):{...lancRestante});
    setSyncStatus('ok',`${DATA.length} registros`);
    closeForm();buildNav();render();
    toast(`Baixa parcial salva: ${fmt(valorParcial)} ${acaoTxt}, ${fmt(restante)} pendente.`,'ok');
  }catch(e){
    setSyncStatus('err','Erro na baixa parcial');
    toast('Erro na baixa parcial: '+e.message,'err');
    if(btn){btn.disabled=false;btn.textContent='💾 Salvar Lançamento';}
  }
}

async function saveForm(){
  const canonicalComp = compFromView(formData.dataCompView)||formData.dataComp;
  const valorBruto = parseMoney(formData.valorBruto);
  const ded = parseMoney(formData.ded);
  const valorLiq = parseMoney(formData.valorLiq)||Math.max(0,valorBruto-ded);
  const valorJuros = parseMoney(formData.valorJuros||0);
  clearFormMarks();
  const _errs=[];
  if(!canonicalComp){_errs.push('Competência é obrigatória.');markInvalid('f-comp');}
  else{const e=validarAno(canonicalComp,'Competência');if(e){_errs.push(e);markInvalid('f-comp');}}
  if(formData.dataPgto){const e=validarAno(formData.dataPgto,'Data Pagamento');if(e){_errs.push(e);markInvalid('f-datapgto');}}
  if(!formData.cat){_errs.push('Categoria é obrigatória.');markInvalid('f-cat');}
  else{const ce=validateCatSub(formData.tipo,formData.cat,formData.sub);if(ce){_errs.push(ce);markInvalid('f-cat');}}
  if(valorBruto<=0){_errs.push('Valor bruto inválido.');markInvalid('f-vbruto');}
  if(valorLiq<=0){_errs.push('Valor líquido inválido.');markInvalid('form-valor-liq');}
  formData.conta=normalizeConta(formData.conta);
  if(!formData.conta||!CONTAS.includes(formData.conta)){_errs.push('Selecione uma conta bancária.');markInvalid('f-conta');}
  if(_errs.length){toast(_errs[0],'err');return;}

  // Resolve categoria/subcategoria de juros ANTES de salvar qualquer coisa
  let jurosCat=null, jurosSub=null;
  if(valorJuros>0){
    if(formData.tipo==='R'){
      const c=CATS_DATA['R'].find(x=>x.nome==='Receitas Financeiras');
      const s=(c?.subs||[]).find(x=>x.nome==='Juros/Multas');
      if(!c||!s){toast('Subcategoria "Juros/Multas" em "Receitas Financeiras" não encontrada.','err');return;}
      jurosCat=c.nome; jurosSub=s.nome;
    }else{
      const c=CATS_DATA['D'].find(x=>x.nome==='Despesas Financeiras');
      const s=(c?.subs||[]).find(x=>x.nome==='Juros/Multas por Atrasos');
      if(!c||!s){toast('Subcategoria "Juros/Multas por Atrasos" em "Despesas Financeiras" não encontrada.','err');return;}
      jurosCat=c.nome; jurosSub=s.nome;
    }
  }

  formData.dataComp = canonicalComp;
  formData.valorBruto = valorBruto;
  formData.ded = ded;
  formData.valorLiq = valorLiq;
  const btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  setSyncStatus('loading','Salvando...');
  try{
    const exists=DATA.findIndex(x=>x.id===formData.id);
    if(exists>=0){await dbUpdate(formData);DATA[exists]={...formData};}
    else{await dbInsert(formData);DATA.unshift({...formData});}

    if(jurosCat&&jurosSub){
      const je={
        id:newId(), tipo:formData.tipo,
        dataComp:formData.dataComp, dataPgto:formData.dataPgto||'',
        cat:jurosCat, sub:jurosSub,
        desc:(formData.desc?formData.desc+' — Juros/Multas':'Juros/Multas'),
        cc:formData.cc||'', forma:formData.forma||'PIX', conta:formData.conta,
        doc:formData.doc||'', valorBruto:valorJuros, ded:0, valorLiq:valorJuros,
        status:formData.status, obs:formData.obs||''
      };
      await dbInsert(je);
      DATA.unshift({...je});
    }

    setSyncStatus('ok',`${DATA.length} registros`);closeForm();buildNav();render();
    toast(jurosCat?'2 lançamentos salvos! ✓':'Lançamento salvo! ✓','ok');
  }catch(e){setSyncStatus('err','Erro ao salvar');toast('Erro ao salvar: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='💾 Salvar Lançamento';}}
}

async function duplicarLancamento(id){
  const orig=DATA.find(l=>l.id===id);
  if(!orig)return;
  const copia={...orig,id:newId(),status:'Pendente',dataPgto:''};
  try{
    const res=await dbInsert(copia);
    DATA.unshift(res?fromRow(res):copia);
    buildNav();render();
    toast('Lançamento duplicado','ok');
  }catch(e){toast('Erro ao duplicar: '+e.message,'err');}
}

async function deleteItem(id){
  const item=DATA.find(x=>x.id===id);
  const isTransf=(item?.doc||'').startsWith('TRANSF#');
  if(!confirm(isTransf?'Excluir esta transferência?':'Excluir este lançamento?'))return;
  setSyncStatus('loading','Excluindo...');
  try{
    await dbDelete(id);
    DATA=DATA.filter(x=>x.id!==id);
    setSyncStatus('ok',`${DATA.length} registros`);
    buildNav();render();
    toast(isTransf?'↔ Transferência excluída.':'Lançamento excluído.','err');
  }catch(e){setSyncStatus('err','Erro ao excluir');toast('Erro ao excluir: '+e.message,'err');}
}

const TRANSF_CAT='Transferência entre Contas';
const TRANSF_SLUG='transferencia';

async function ensureTransfCat(){
  for(const tipo of ['R','D']){
    if((CATS_DATA[tipo]||[]).find(c=>c.nome===TRANSF_CAT))continue;
    const id=newId();
    const ordem=(CATS_DATA[tipo]||[]).length;
    await sbFetch('POST','categorias',[{id,tipo,nome:TRANSF_CAT,slug:TRANSF_SLUG,ordem}]);
    const subId=newId();
    const sub={id:subId,categoria_id:id,nome:TRANSF_CAT,slug:TRANSF_SLUG,ordem:0};
    await sbFetch('POST','subcategorias',[sub]);
    if(!CATS_DATA[tipo])CATS_DATA[tipo]=[];
    CATS_DATA[tipo].push({id,tipo,nome:TRANSF_CAT,slug:TRANSF_SLUG,ordem,subs:[sub]});
  }
  rebuildCatsObj();
}

  const today=new Date().toISOString().slice(0,10);

    </div>

function closeTransfModal(){
  document.getElementById('transf-overlay').style.display='none';
}

async function saveTransferencia(){
  const data=document.getElementById('transf-data').value;
  const origem=document.getElementById('transf-origem').value;
  const destino=document.getElementById('transf-destino').value;
  const valor=parseMoney(document.getElementById('transf-valor').value);
  const desc=document.getElementById('transf-desc').value.trim();
  const status='Pago';
  if(!data){toast('Informe a data.','err');return;}
  if(!origem){toast('Informe a conta de origem.','err');return;}
  if(!destino){toast('Informe a conta de destino.','err');return;}
  if(origem===destino){toast('Origem e destino devem ser contas diferentes.','err');return;}
  if(!valor||valor<=0){toast('Informe um valor válido.','err');return;}
  setSyncStatus('loading','Salvando transferência...');
  try{
    await ensureTransfCat();
    const ref='TRANSF#'+newId();
    const descFinal=desc||`Transferência: ${origem} → ${destino}`;
    const rec={id:newId(),tipo:'D',dataComp:data,dataPgto:data,cat:TRANSF_CAT,sub:TRANSF_CAT,desc:descFinal,conta:origem,doc:ref,valorBruto:valor,ded:0,valorLiq:valor,status,obs:`TRANSF_DEST:${destino}`};
    const saved=await dbInsert(rec);
    DATA.unshift(fromRow(saved||rec));
    setSyncStatus('ok',`${DATA.length} registros`);
    closeTransfModal();
    buildNav();render();
    toast('↔ Transferência registrada!','ok');
  }catch(e){setSyncStatus('err','Erro');toast('Erro ao salvar: '+e.message,'err');}
}

async function saveRecorrente(){
  const valor=parseMoney(recData.valor);
  if(!recData.desc||!recData.cat||valor<=0){toast('Preencha os campos obrigatórios (*)','err');return;}
  const catErr=validateCatSub('D',recData.cat,recData.sub);
  if(catErr){toast(catErr,'err');return;}
  recData.valor=valor;
  const idx=RECORRENTES_DESPESAS.findIndex(r=>r.id===recData.id);
  try{
    if(idx>=0){
      await sbFetch('PATCH',`recorrentes?id=eq.${recData.id}`,toRecorrenteRow(recData));
      RECORRENTES_DESPESAS[idx]={...recData};
    } else {
      await sbFetch('POST','recorrentes',toRecorrenteRow(recData));
      RECORRENTES_DESPESAS.push({...recData});
    }
  }catch(e){toast('Erro ao salvar: '+e.message,'err');return;}
  closeForm();render();toast('Recorrente salvo! ✓','ok');
}

async function deleteRecorrente(id){
  if(!confirm('Excluir este recorrente permanentemente?'))return;
  try{
    await sbFetch('DELETE',`recorrentes?id=eq.${id}`);
    const idx=RECORRENTES_DESPESAS.findIndex(r=>r.id===id);
    if(idx>=0)RECORRENTES_DESPESAS.splice(idx,1);
    render();toast('Recorrente excluído','ok');
  }catch(e){toast('Erro ao excluir: '+e.message,'err');}
}
